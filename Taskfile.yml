---
version: '3'

tasks:
  default:
    cmds:
      - task --list --taskfile '{{.TASKFILE}}'
    silent: true

  usage:
    desc: Generate usage description.
    cmds:
      - echo > {{.U}} '```bash'
      - ./scare >> {{.U}} -h 2>&1
      - echo >> {{.U}} '```'
    vars:
      U: USAGE.md

  fmt:
    desc: Format project files.
    cmds:
      - go fmt

  build:
    deps: [fmt]
    desc: Build project.
    cmds:
      - go build -o scare

  install:
    deps: [build]
    desc: Install binary.
    cmds:
      - sudo install -C scare /usr/local/bin/scare

  clean:
    desc: Cleanup project directory.
    cmds:
      - go clean
